name: Fortran Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
    
      - uses: fortran-lang/setup-fortran@v1
        id: setup-fortran
        with:
          compiler: intel
          version: 2024.1

      - run: |
          echo "Fortran compiler: ${{ env.FC }}"
          echo "C compiler: ${{ env.CC }}"
          echo "C++ compiler: ${{ env.CXX }}"
          
      - name: Run build script
        run: .\build.bat
        
